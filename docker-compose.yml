# CGCloud - Docker Compose (Development Infrastructure Only)
# ─────────────────────────────────────────────────────────────────────────────
# PHP App 由 Laravel Herd (Windows) 負責，含 SSL + cgcloud.test 域名
# Docker 僅負責基礎設施：PostgreSQL 18 + Redis
# 連線方式：Herd → 127.0.0.1:5432 / 127.0.0.1:6379
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── PostgreSQL 18 Alpine ─────────────────────────────────────────────────
  pgsql:
    image: 'postgres:18-alpine'
    command: postgres -c max_connections=100 -c idle_session_timeout=60000 -c idle_in_transaction_session_timeout=30000
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      PGPASSWORD: '${DB_PASSWORD}'
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - 'sail-pgsql:/var/lib/postgresql/data'
      - './docker/pgsql/init.sql:/docker-entrypoint-initdb.d/10-init.sql'
    networks:
      - sail
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USERNAME}']
      interval: 10s
      retries: 5
      timeout: 5s

  # ─── Redis Alpine (with password + AOF persistence) ───────────────────────
  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - 'sail-redis:/data'
    networks:
      - sail
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      retries: 5
      timeout: 5s

# ─── Named Volumes ──────────────────────────────────────────────────────────
volumes:
  sail-pgsql:
    driver: local
  sail-redis:
    driver: local

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  sail:
    driver: bridge
